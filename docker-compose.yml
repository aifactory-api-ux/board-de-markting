version: '3.8'

services:
  postgres:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: boarduser
      POSTGRES_PASSWORD: boardpassword
      POSTGRES_DB: board
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boarduser -d board"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://boarduser:boardpassword@postgres:5432/board
      JWT_SECRET: supersecretjwtkeychangeinproduction
      JWT_EXPIRES_IN: 7d
      S3_BUCKET: apiux-marketing-board
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      FRONTEND_URL: http://localhost
      CORS_ORIGIN: http://localhost
      ADMIN_EMAIL: admin@apiux.com
      ADMIN_PASSWORD: strongpassword
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: